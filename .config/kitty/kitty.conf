# ── Fuente ────────────────────────────────────────────────────────
font_family      JetBrainsMonoNL Nerd Font
bold_font        JetBrainsMonoNL Nerd Font Bold
italic_font      JetBrainsMonoNL Nerd Font Italic
font_size        11.0

# ── Transparencia + blur (picom maneja el blur) ───────────────────
background_opacity 0.82
dynamic_background_opacity yes

# ── Catppuccin Mocha ──────────────────────────────────────────────
foreground            #CDD6F4
background            #1E1E2E
selection_foreground  #1E1E2E
selection_background  #CBA6F7

# Cursors
cursor                #F5E0DC
cursor_text_color     #1E1E2E

# URLs
url_color             #89B4FA

# Bordes de ventana dividida
active_border_color   #CBA6F7
inactive_border_color #45475A
bell_border_color     #F9E2AF

# Tabs
active_tab_foreground   #1E1E2E
active_tab_background   #CBA6F7
inactive_tab_foreground #CDD6F4
inactive_tab_background #313244
tab_bar_background      #181825

# 16 colores
color0  #45475A
color1  #F38BA8
color2  #A6E3A1
color3  #F9E2AF
color4  #89B4FA
color5  #F5C2E7
color6  #94E2D5
color7  #BAC2DE
color8  #585B70
color9  #F38BA8
color10 #A6E3A1
color11 #F9E2AF
color12 #89B4FA
color13 #F5C2E7
color14 #94E2D5
color15 #A6ADC8

# ── Layout ────────────────────────────────────────────────────────
window_padding_width    12 16
confirm_os_window_close 0
enable_audio_bell       no

# ── Tabs ──────────────────────────────────────────────────────────
tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted

# ── Rendimiento ───────────────────────────────────────────────────
sync_to_monitor yes
repaint_delay   8
input_delay     2

# ── Cursor ────────────────────────────────────────────────────────
cursor_shape           beam
cursor_blink_interval  0.5

# ── Keymaps extra ─────────────────────────────────────────────────
map ctrl+shift+equal  change_font_size all +1.0
map ctrl+shift+minus  change_font_size all -1.0
map ctrl+shift+0      change_font_size all 0
map ctrl+shift+t      new_tab_with_cwd
map ctrl+shift+enter  new_window_with_cwd
